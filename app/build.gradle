plugins {
    id 'com.android.application'
}

android {
    namespace 'com.hyperdesk.mr'
    compileSdk 34
    ndkVersion "29.0.13599879"

    defaultConfig {
        applicationId "com.hyperdesk.mr"
        minSdk 32
        targetSdk 34
        versionCode 1
        versionName "0.1.0"

        ndk {
            abiFilters "arm64-v8a"
        }

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++20"
                arguments "-DANDROID_STL=c++_shared",
                          "-DANDROID_PLATFORM=android-32",
                          "-DANDROID_ARM_NEON=TRUE"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }
}
