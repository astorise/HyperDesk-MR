name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build debug APK (arm64-v8a)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses and install NDK r29
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;29.0.13599879"

      - name: Build third-party dependencies
        run: |
          set -e
          NDK="$ANDROID_SDK_ROOT/ndk/29.0.13599879"
          TOOLCHAIN="$NDK/build/cmake/android.toolchain.cmake"
          ANDROID_ARGS="-DCMAKE_TOOLCHAIN_FILE=$TOOLCHAIN -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-32 -DCMAKE_BUILD_TYPE=Release"

          # ── OpenXR loader ────────────────────────────────────────────────────
          curl -fL https://github.com/KhronosGroup/OpenXR-SDK-Source/archive/refs/tags/release-1.1.43.tar.gz \
            | tar xz -C /tmp/
          cmake -S /tmp/OpenXR-SDK-Source-release-1.1.43 -B /tmp/openxr-build \
            $ANDROID_ARGS -DDYNAMIC_LOADER=ON -DBUILD_TESTS=OFF \
            -DBUILD_CONFORMANCE_TESTS=OFF -DBUILD_API_LAYERS=OFF
          cmake --build /tmp/openxr-build --target openxr_loader --parallel $(nproc)

          mkdir -p third_party/openxr/include/openxr third_party/openxr/libs/android.arm64-v8a
          # Static headers from source tree
          cp -r /tmp/OpenXR-SDK-Source-release-1.1.43/include/openxr/. third_party/openxr/include/openxr/
          # Generated headers (openxr.h, openxr_platform.h, etc.) from build dir
          cp -r /tmp/openxr-build/include/openxr/. third_party/openxr/include/openxr/ 2>/dev/null || true
          cp /tmp/openxr-build/src/loader/libopenxr_loader.so \
            third_party/openxr/libs/android.arm64-v8a/

          # ── FreeRDP 3 ────────────────────────────────────────────────────────
          # Prebuilt OpenSSL .so for Android (link-time dependency for FreeRDP)
          git clone --depth=1 https://github.com/KDAB/android_openssl.git /tmp/android_openssl
          OPENSSL_PREBUILT=/tmp/android_openssl/ssl_3

          # OpenSSL headers: install then copy into NDK sysroot so the cross-
          # compiler finds them natively (avoids host vs. sysroot header conflict)
          sudo apt-get install -y libssl-dev
          NDK_SYSROOT="$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          sudo cp -r /usr/include/openssl "$NDK_SYSROOT/usr/include/"
          # opensslconf.h is in a multiarch path on Ubuntu 24.04
          sudo cp /usr/include/x86_64-linux-gnu/openssl/*.h \
            "$NDK_SYSROOT/usr/include/openssl/" 2>/dev/null || true
          OPENSSL_INC="$NDK_SYSROOT/usr/include"

          git clone --depth=1 --branch 3.8.0 https://github.com/FreeRDP/FreeRDP.git /tmp/freerdp
          cmake -S /tmp/freerdp -B /tmp/freerdp-build \
            $ANDROID_ARGS \
            -DOPENSSL_INCLUDE_DIR="$OPENSSL_INC" \
            -DOPENSSL_SSL_LIBRARY="$OPENSSL_PREBUILT/lib64/libssl_3.so" \
            -DOPENSSL_CRYPTO_LIBRARY="$OPENSSL_PREBUILT/lib64/libcrypto_3.so" \
            -DWITH_SAMPLE=OFF -DWITH_CLIENT=OFF -DWITH_SERVER=OFF \
            -DBUILD_SHARED_LIBS=OFF -DWITH_JPEG=OFF -DWITH_FFMPEG=OFF \
            -DWITH_OPUS=OFF -DWITH_WEBVIEW=OFF -DWITH_SWSCALE=OFF \
            -DCMAKE_HAVE_LIBC_PTHREAD=1 \
            -DCMAKE_THREAD_LIBS_INIT="" \
            -DThreads_FOUND=TRUE
          cmake --build /tmp/freerdp-build \
            --target freerdp winpr freerdp-client --parallel $(nproc)

          mkdir -p third_party/freerdp/lib \
                   third_party/freerdp/include/freerdp \
                   third_party/freerdp/include/winpr
          find /tmp/freerdp-build -name "*.a" | sort
          cp "$(find /tmp/freerdp-build -name 'libwinpr3.a')"          third_party/freerdp/lib/
          cp "$(find /tmp/freerdp-build -name 'libfreerdp3.a')"        third_party/freerdp/lib/
          cp "$(find /tmp/freerdp-build -name 'libfreerdp-client3.a')" third_party/freerdp/lib/
          # Headers: source tree (freerdp/ and winpr/ subdirs)
          cp -r /tmp/freerdp/include/freerdp/. third_party/freerdp/include/freerdp/
          cp -r /tmp/freerdp/winpr/include/winpr/. third_party/freerdp/include/winpr/
          # Build-generated headers (config.h, version.h, etc.)
          cp -r /tmp/freerdp-build/include/freerdp/. \
            third_party/freerdp/include/freerdp/ 2>/dev/null || true
          cp -r /tmp/freerdp-build/winpr/include/winpr/. \
            third_party/freerdp/include/winpr/ 2>/dev/null || true

      - name: Generate Gradle wrapper jar
        run: |
          mkdir /tmp/wg
          touch /tmp/wg/settings.gradle
          cd /tmp/wg && gradle wrapper --gradle-version 8.9
          cp /tmp/wg/gradle/wrapper/gradle-wrapper.jar "$GITHUB_WORKSPACE/gradle/wrapper/"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Verify third-party artifacts
        run: |
          echo "=== OpenXR ==="
          find third_party/openxr -type f | sort
          echo "=== FreeRDP ==="
          find third_party/freerdp -type f | sort

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperdesk-mr-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
