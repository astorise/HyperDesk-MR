name: Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Build & run unit tests (Ubuntu 24.04)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake build-essential libopenxr-dev

      - name: Configure CMake
        run: cmake -S tests -B build/tests -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build/tests --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build/tests --output-on-failure

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/tests/Testing/
          retention-days: 7
